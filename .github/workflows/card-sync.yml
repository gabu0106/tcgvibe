name: Weekly Card Sync

on:
  schedule:
    - cron: '0 12 * * 0'
  workflow_dispatch:

jobs:
  sync-pokemon-sets:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: sync-pokemon-sets
        run: |
          echo "=== Pokemon TCG セット同期 ==="
          curl -sS --max-time 120 -X POST https://tcgvibe.com/api/card-sync \
            -H "Content-Type: application/json" \
            -H "X-API-Key: ${{ secrets.INTERNAL_API_KEY }}" \
            -d '{"action":"sync_pokemon_sets"}'

  sync-pokemon-cards:
    runs-on: ubuntu-latest
    needs: sync-pokemon-sets
    timeout-minutes: 15
    steps:
      - name: sync-pokemon-cards
        run: |
          echo "=== Pokemon TCG カード画像同期（最新10セット） ==="
          curl -sS --max-time 600 -X POST https://tcgvibe.com/api/card-sync \
            -H "Content-Type: application/json" \
            -H "X-API-Key: ${{ secrets.INTERNAL_API_KEY }}" \
            -d '{"action":"sync_pokemon_cards","set_limit":10}' || true

  sync-onepiece:
    runs-on: ubuntu-latest
    needs: sync-pokemon-cards
    timeout-minutes: 10
    steps:
      - name: sync-onepiece
        run: |
          echo "=== ワンピースカード同期 ==="
          curl -sS --max-time 120 -X POST https://tcgvibe.com/api/card-sync \
            -H "Content-Type: application/json" \
            -H "X-API-Key: ${{ secrets.INTERNAL_API_KEY }}" \
            -d '{"action":"sync_onepiece_sets"}' || true
          sleep 2
          curl -sS --max-time 300 -X POST https://tcgvibe.com/api/card-sync \
            -H "Content-Type: application/json" \
            -H "X-API-Key: ${{ secrets.INTERNAL_API_KEY }}" \
            -d '{"action":"sync_onepiece_cards"}' || true
