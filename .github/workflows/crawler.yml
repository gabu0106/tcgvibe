name: TCG Agent System v3

on:
  schedule:
    - cron: '0 21 * * *'
  workflow_dispatch:

jobs:
  crawl-cardrush-pokemon:
    runs-on: ubuntu-latest
    steps:
      - name: cardrush_pokemon
        run: curl -s -o /dev/null -X POST https://tcgvibe.com/api/agent-crawler/cardrush_pokemon

  crawl-cardrush-op:
    runs-on: ubuntu-latest
    steps:
      - name: cardrush_op
        run: curl -s -o /dev/null -X POST https://tcgvibe.com/api/agent-crawler/cardrush_op

  crawl-raftel:
    runs-on: ubuntu-latest
    steps:
      - name: raftel
        run: curl -s -o /dev/null -X POST https://tcgvibe.com/api/agent-crawler/raftel

  crawl-onehappy:
    runs-on: ubuntu-latest
    steps:
      - name: onehappy
        run: curl -s -o /dev/null -X POST https://tcgvibe.com/api/agent-crawler/onehappy

  crawl-torecacamp:
    runs-on: ubuntu-latest
    steps:
      - name: torecacamp
        run: curl -s -o /dev/null -X POST https://tcgvibe.com/api/agent-crawler/torecacamp

  crawl-hareruya:
    runs-on: ubuntu-latest
    steps:
      - name: hareruya
        run: curl -s -o /dev/null -X POST https://tcgvibe.com/api/agent-crawler/hareruya

  crawl-torechart-pokemon:
    runs-on: ubuntu-latest
    steps:
      - name: torechart_pokemon
        run: curl -s -o /dev/null -X POST https://tcgvibe.com/api/agent-crawler/torechart_pokemon

  crawl-torechart-op:
    runs-on: ubuntu-latest
    steps:
      - name: torechart_op
        run: curl -s -o /dev/null -X POST https://tcgvibe.com/api/agent-crawler/torechart_op

  crawl-note:
    runs-on: ubuntu-latest
    steps:
      - name: note_pros
        run: curl -s -o /dev/null -X POST https://tcgvibe.com/api/agent-crawler/note_pros

  crawl-snkrdunk:
    runs-on: ubuntu-latest
    steps:
      - name: snkrdunk
        run: curl -s -o /dev/null -X POST https://tcgvibe.com/api/agent-crawler/snkrdunk

  collect-x:
    runs-on: ubuntu-latest
    steps:
      - name: x_collector
        run: curl -s -o /dev/null -X POST https://tcgvibe.com/api/agent-x-collector

  run-master:
    runs-on: ubuntu-latest
    needs: [crawl-cardrush-pokemon, crawl-cardrush-op, crawl-raftel, crawl-onehappy, crawl-torecacamp, crawl-hareruya, crawl-torechart-pokemon, crawl-torechart-op, crawl-note, crawl-snkrdunk, collect-x]
    steps:
      - name: master
        run: curl -s -o /dev/null -X POST https://tcgvibe.com/api/agent-master
