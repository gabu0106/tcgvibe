name: TCG Agent System v3

on:
  schedule:
    - cron: '0 21 * * *'
  workflow_dispatch:

jobs:
  step1-collect:
    runs-on: ubuntu-latest
    steps:
      - name: collect
        env:
          BODY: '{"action":"collect"}'
        run: curl -s -X POST https://tcgvibe.com/api/agent-master -H "Content-Type: application/json" -d "$BODY"

  step2-generate:
    runs-on: ubuntu-latest
    needs: step1-collect
    steps:
      - name: generate
        env:
          BODY: '{"action":"generate"}'
        run: curl -s -X POST https://tcgvibe.com/api/agent-master -H "Content-Type: application/json" -d "$BODY"
