<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Card Gallery - TCGVIBE.AI | パック別カード画像・買取価格一覧</title>
<meta name="description" content="ポケモンカード・ワンピースカードのパック別カード画像ギャラリー。買取価格、PSA10相場、レアリティ情報を一覧表示。">
<meta property="og:title" content="Card Gallery - TCGVIBE.AI">
<meta property="og:description" content="パック別カード画像ギャラリー。買取価格・PSA10相場つき">
<meta property="og:type" content="website">
<meta property="og:url" content="https://tcgvibe.com/card-list.html">
<link rel="canonical" href="https://tcgvibe.com/card-list.html">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Sans:wght@300;400;500&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#faf9f6;--bg2:#f3f1ec;--bg3:#ece9e2;--surface:#fff;--border:rgba(0,0,0,0.06);--border2:rgba(0,0,0,0.1);--text:#1a1814;--muted:#8a857e;--gold:#b8952a;--gold2:#d4af5a;--gold-light:#f5edda;--gold-glow:rgba(184,149,42,0.12);--shadow:rgba(0,0,0,0.06);--shadow2:rgba(0,0,0,0.1);--red:#c0392b;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans','Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
::selection{background:var(--gold2);color:#fff;}

.nav{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(250,249,246,0.88);backdrop-filter:blur(24px);border-bottom:1px solid var(--border);padding:0 2rem;display:flex;align-items:center;height:56px;}
.nav-logo{font-family:'Cormorant Garamond',serif;font-size:1.25rem;font-weight:600;letter-spacing:0.1em;text-decoration:none;color:var(--text);}
.nav-logo span{color:var(--gold);}
.nav-links{margin-left:auto;display:flex;gap:1.5rem;}
.nav-links a{font-size:0.72rem;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);text-decoration:none;transition:color 0.2s;}
.nav-links a:hover,.nav-links a.active{color:var(--gold);}

.hero{padding:5rem 2rem 1.5rem;text-align:center;position:relative;background:linear-gradient(180deg,var(--bg) 0%,var(--bg2) 100%);}
.hero::before{content:'';position:absolute;top:-40%;left:50%;transform:translateX(-50%);width:600px;height:400px;background:radial-gradient(ellipse,var(--gold-glow) 0%,transparent 70%);pointer-events:none;}
.hero-title{font-family:'Cormorant Garamond',serif;font-size:2.8rem;font-weight:300;letter-spacing:0.06em;position:relative;}
.hero-title span{color:var(--gold);}
.hero-sub{color:var(--muted);font-size:0.82rem;margin-top:0.4rem;position:relative;}

.tab-bar{display:flex;justify-content:center;gap:0.5rem;margin:1.2rem 0 1.5rem;}
.tab{background:var(--surface);border:1px solid var(--border2);padding:0.5rem 1.8rem;font-family:inherit;font-size:0.76rem;font-weight:500;letter-spacing:0.06em;color:var(--muted);cursor:pointer;border-radius:999px;transition:all 0.25s;box-shadow:0 1px 3px var(--shadow);}
.tab:hover{border-color:var(--gold2);color:var(--text);}
.tab.active{background:var(--gold-light);border-color:var(--gold2);color:var(--gold);}

.container{max-width:1280px;margin:0 auto;padding:0 2rem 4rem;}

.toolbar{display:flex;gap:0.6rem;flex-wrap:wrap;align-items:center;margin-bottom:1.5rem;}
.search-input{background:var(--surface);border:1px solid var(--border2);padding:0.55rem 1.2rem;font-family:inherit;font-size:0.8rem;color:var(--text);border-radius:999px;outline:none;width:260px;transition:all 0.2s;box-shadow:0 1px 3px var(--shadow);}
.search-input:focus{border-color:var(--gold2);box-shadow:0 2px 10px var(--gold-glow);}
.search-input::placeholder{color:var(--muted);}
.toolbar-right{margin-left:auto;display:flex;gap:0.5rem;align-items:center;}
.stats{color:var(--muted);font-size:0.72rem;letter-spacing:0.04em;}
.stats strong{color:var(--gold);}

/* RANKING */
.ranking-section{margin-bottom:2rem;}
.section-title{font-family:'Cormorant Garamond',serif;font-size:1.3rem;font-weight:400;margin-bottom:1rem;display:flex;align-items:center;gap:0.5rem;}
.section-title::before{content:'';width:3px;height:1.2em;background:var(--gold);border-radius:2px;}
.ranking-scroll{display:flex;gap:0.8rem;overflow-x:auto;padding-bottom:0.5rem;scroll-snap-type:x mandatory;}
.ranking-scroll::-webkit-scrollbar{height:4px;}
.ranking-scroll::-webkit-scrollbar-track{background:var(--bg2);border-radius:2px;}
.ranking-scroll::-webkit-scrollbar-thumb{background:var(--gold2);border-radius:2px;}
.rank-card{flex-shrink:0;width:140px;scroll-snap-align:start;background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden;cursor:pointer;transition:all 0.25s;box-shadow:0 1px 4px var(--shadow);position:relative;}
.rank-card:hover{border-color:var(--gold2);transform:translateY(-3px);box-shadow:0 6px 20px var(--shadow2);}
.rank-badge{position:absolute;top:6px;left:6px;background:var(--gold);color:#fff;font-size:0.55rem;font-weight:700;padding:0.15rem 0.4rem;border-radius:3px;z-index:1;}
.rank-card-img{height:160px;background:var(--bg2);display:flex;align-items:center;justify-content:center;overflow:hidden;}
.rank-card-img img{height:100%;object-fit:contain;}
.rank-card-body{padding:0.45rem 0.55rem 0.55rem;}
.rank-card-name{font-size:0.62rem;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.rank-card-num{font-size:0.52rem;color:var(--muted);margin-top:0.05rem;}
.rank-card-price{font-size:0.68rem;font-weight:600;color:var(--red);margin-top:0.15rem;}

/* PACK LIST */
.pack-list{display:flex;flex-direction:column;gap:0.5rem;}
.pack-row{display:flex;align-items:center;gap:1rem;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:0.75rem 1.1rem;cursor:pointer;transition:all 0.25s;box-shadow:0 1px 4px var(--shadow);}
.pack-row:hover{border-color:var(--gold2);transform:translateX(4px);box-shadow:0 4px 16px var(--shadow2),0 0 12px var(--gold-glow);}
.pack-row-logo{width:48px;height:48px;border-radius:6px;object-fit:contain;flex-shrink:0;background:var(--bg2);}
.pack-row-logo-placeholder{width:48px;height:48px;border-radius:6px;background:var(--bg2);display:flex;align-items:center;justify-content:center;font-size:1.2rem;opacity:0.3;flex-shrink:0;}
.pack-row-info{flex:1;min-width:0;}
.pack-row-name{font-size:0.88rem;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pack-row-code{font-size:0.62rem;color:var(--muted);margin-top:0.1rem;}
.pack-row-right{display:flex;gap:0.8rem;align-items:center;flex-shrink:0;}
.pack-row-date{font-size:0.62rem;color:var(--muted);white-space:nowrap;}
.badge{background:var(--gold-light);color:var(--gold);padding:0.15rem 0.5rem;border-radius:999px;font-size:0.58rem;font-weight:600;white-space:nowrap;}
.pack-row-arrow{color:var(--muted);font-size:0.8rem;opacity:0.4;transition:opacity 0.2s;}
.pack-row:hover .pack-row-arrow{opacity:1;color:var(--gold);}
.load-more{display:flex;justify-content:center;margin:2rem 0;}
.load-btn{background:var(--surface);border:1px solid var(--border2);color:var(--muted);padding:0.6rem 2.5rem;font-family:inherit;font-size:0.76rem;letter-spacing:0.06em;text-transform:uppercase;cursor:pointer;border-radius:999px;transition:all 0.25s;}
.load-btn:hover{border-color:var(--gold);color:var(--gold);}
.load-btn:disabled{opacity:0.4;cursor:default;}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,0.3);backdrop-filter:blur(6px);overflow-y:auto;padding:1.5rem;}
.modal-overlay.open{display:flex;justify-content:center;align-items:flex-start;}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:14px;width:100%;max-width:1100px;margin:1.5rem auto;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,0.12);animation:modalIn 0.25s ease;}
@keyframes modalIn{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
.modal-header{display:flex;align-items:center;gap:1rem;padding:1.25rem 1.75rem;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--surface);z-index:1;}
.modal-header-info{flex:1;min-width:0;}
.modal-header-title{font-family:'Cormorant Garamond',serif;font-size:1.4rem;font-weight:400;}
.modal-header-meta{font-size:0.7rem;color:var(--muted);margin-top:0.15rem;}
.modal-close{background:none;border:1px solid var(--border2);color:var(--muted);padding:0.35rem 1rem;font-family:inherit;font-size:0.7rem;letter-spacing:0.06em;text-transform:uppercase;cursor:pointer;border-radius:999px;transition:all 0.2s;flex-shrink:0;}
.modal-close:hover{border-color:var(--gold);color:var(--gold);}
.modal-toolbar{display:flex;gap:0.5rem;flex-wrap:wrap;padding:0.75rem 1.75rem;border-bottom:1px solid var(--border);background:var(--bg);}
.view-btn{background:none;border:1px solid var(--border2);padding:0.35rem 0.7rem;font-size:0.72rem;color:var(--muted);cursor:pointer;border-radius:4px;transition:all 0.2s;font-family:inherit;}
.view-btn.active,.view-btn:hover{border-color:var(--gold2);color:var(--gold);}
.modal-body{padding:1.25rem 1.75rem 1.75rem;}
.modal-loading{text-align:center;padding:3rem;color:var(--muted);font-size:0.82rem;}

/* CARD GRID */
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(145px,1fr));gap:0.85rem;}
.card-item{background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden;cursor:pointer;transition:all 0.25s;box-shadow:0 1px 3px var(--shadow);position:relative;}
.card-item:hover{border-color:var(--gold2);transform:translateY(-3px);box-shadow:0 8px 24px var(--shadow2);}
.card-img-wrap{position:relative;padding-top:140%;background:var(--bg2);overflow:hidden;}
.card-img-wrap img{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;transition:transform 0.3s;}
.card-item:hover .card-img-wrap img{transform:scale(1.05);}
.card-no-img{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:2rem;opacity:0.15;}
.card-meta{padding:0.5rem 0.6rem 0.6rem;}
.card-meta-name{font-size:0.68rem;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.card-meta-detail{display:flex;flex-wrap:wrap;gap:0.2rem 0.4rem;margin-top:0.25rem;align-items:center;}
.card-meta-detail span{font-size:0.54rem;color:var(--muted);}
.rarity-badge{display:inline-block;padding:0.1rem 0.35rem;font-size:0.52rem;font-weight:600;border-radius:3px;background:var(--gold-light);color:var(--gold);}
.rarity-badge.sr{background:#ffe8e8;color:#c0392b;}
.rarity-badge.sar,.rarity-badge.ur,.rarity-badge.sec{background:linear-gradient(135deg,#f5edda,#ffe8d0);color:#b8652a;}
.card-price{font-size:0.64rem;font-weight:600;color:var(--red);margin-top:0.2rem;}

/* LIGHTBOX */
.lightbox{display:none;position:fixed;inset:0;z-index:300;background:rgba(0,0,0,0.75);align-items:center;justify-content:center;padding:2rem;}
.lightbox.open{display:flex;}
.lightbox img{max-width:90vw;max-height:85vh;border-radius:10px;box-shadow:0 16px 60px rgba(0,0,0,0.35);}
.lightbox-close{position:absolute;top:1.5rem;right:2rem;background:rgba(255,255,255,0.1);border:none;color:#fff;width:40px;height:40px;border-radius:50%;font-size:1.4rem;cursor:pointer;transition:background 0.2s;display:flex;align-items:center;justify-content:center;}
.lightbox-close:hover{background:rgba(255,255,255,0.2);}
.lightbox-info{position:absolute;bottom:2rem;left:50%;transform:translateX(-50%);background:var(--surface);border:1px solid var(--border2);padding:0.8rem 1.5rem;border-radius:10px;font-size:0.8rem;text-align:center;max-width:90vw;box-shadow:0 8px 28px rgba(0,0,0,0.1);}
.lightbox-info strong{display:block;margin-bottom:0.2rem;color:var(--gold);}
.lightbox-detail{font-size:0.7rem;color:var(--muted);margin-top:0.15rem;}

.loading{text-align:center;padding:3rem;color:var(--muted);font-size:0.82rem;}

@media(max-width:768px){
  .hero{padding:4.5rem 1rem 1.2rem;}
  .hero-title{font-size:2rem;}
  .container{padding:0 1rem 3rem;}
  .toolbar{flex-direction:column;align-items:stretch;}
  .toolbar-right{margin-left:0;justify-content:space-between;}
  .search-input{width:100%;}
  .pack-row{padding:0.6rem 0.8rem;gap:0.6rem;}
  .pack-row-logo,.pack-row-logo-placeholder{width:36px;height:36px;}
  .pack-row-name{font-size:0.78rem;}
  .pack-row-date{display:none;}
  .card-grid{grid-template-columns:repeat(auto-fill,minmax(115px,1fr));gap:0.6rem;}
  .modal-header{padding:1rem;flex-wrap:wrap;}
  .modal-toolbar{padding:0.6rem 1rem;}
  .modal-body{padding:0.8rem 1rem;}
  .rank-card{width:120px;}
  .rank-card-img{height:140px;}
}
</style>
</head>
<body>

<nav class="nav">
  <a class="nav-logo" href="/">TCGVIBE<span>.AI</span></a>
  <div class="nav-links"><a href="/">TOP</a><a href="/card-list.html" class="active">GALLERY</a></div>
</nav>

<div class="hero">
  <h1 class="hero-title">Card <span>Gallery</span></h1>
  <p class="hero-sub">パック別カード画像・買取価格一覧（カードラッシュ準拠）</p>
</div>

<div class="tab-bar">
  <button class="tab active" onclick="setGame('pokeca',this)">ポケモンカード</button>
  <button class="tab" onclick="setGame('onepiece',this)">ワンピースカード</button>
</div>

<div class="container">
  <div class="ranking-section" id="rankingSection">
    <div class="section-title">高額カードランキング</div>
    <div class="ranking-scroll" id="rankingScroll"><div class="loading">読み込み中...</div></div>
  </div>

  <div class="toolbar">
    <input class="search-input" type="text" id="searchInput" placeholder="カード名で検索..." oninput="debounceSearch()">
    <div class="toolbar-right">
      <span class="stats"><strong id="statsPackCount">-</strong> パック収録</span>
    </div>
  </div>

  <div id="mainContent">
    <div class="pack-list" id="packList"><div class="loading">読み込み中...</div></div>
    <div class="load-more" id="loadMore" style="display:none">
      <button class="load-btn" id="loadBtn" onclick="showMorePacks()">さらにパックを表示</button>
    </div>
  </div>
</div>

<!-- CARD MODAL -->
<div class="modal-overlay" id="cardModal" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-header" id="modalHeader"></div>
    <div class="modal-toolbar" id="modalToolbar"></div>
    <div class="modal-body" id="modalBody"><div class="modal-loading">読み込み中...</div></div>
  </div>
</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="closeLightbox(event)">
  <button class="lightbox-close" onclick="closeLightbox()">&times;</button>
  <img id="lightboxImg" src="" alt="">
  <div class="lightbox-info">
    <strong id="lightboxName"></strong>
    <span id="lightboxMeta"></span>
    <div class="lightbox-detail" id="lightboxDetail"></div>
  </div>
</div>

<script>
let currentGame = 'pokeca';
let allPacks = [];
let packsShown = 0;
const PACKS_PER_PAGE = 30;
let modalCards = [];
let currentSort = 'number';
let searchTimer = null;

function fmtPrice(p) {
  if (!p) return '';
  const n = parseInt((p+'').replace(/[^0-9]/g, ''));
  return n > 0 ? '¥' + n.toLocaleString() : p;
}

function rarityClass(r) {
  if (!r) return '';
  const u = r.toUpperCase();
  if (u === 'SR' || u === 'SUPER RARE') return 'sr';
  if (u === 'SAR' || u === 'SPECIAL ART RARE' || u === 'ART RARE') return 'sar';
  if (u === 'UR' || u === 'ULTRA RARE') return 'ur';
  if (u === 'SEC' || u === 'SECRET RARE' || u.includes('SEC')) return 'sec';
  return '';
}

// ===== INIT =====
async function init() {
  document.getElementById('packList').innerHTML = '<div class="loading">読み込み中...</div>';
  packsShown = 0;
  await Promise.all([fetchPacks(), loadRanking()]);
  renderPacks(true);
}

async function fetchPacks() {
  try {
    const res = await fetch(`/api/card-images?action=packs&game=${currentGame}`);
    const data = await res.json();
    allPacks = data.packs || [];
    document.getElementById('statsPackCount').textContent = allPacks.length;
  } catch(e) { console.error(e); allPacks = []; }
}

// ===== RANKING =====
async function loadRanking() {
  try {
    const res = await fetch(`/api/card-images?action=ranking&game=${currentGame}&limit=15`);
    const data = await res.json();
    const ranking = data.ranking || [];
    const el = document.getElementById('rankingScroll');
    if (ranking.length === 0) { el.innerHTML = '<span class="loading" style="padding:1rem">データなし</span>'; return; }
    el.innerHTML = ranking.map(r => `
      <div class="rank-card" onclick="openLightboxDirect('${r.image_url||''}','${esc(r.card_name)}','${fmtPrice(r.buy_price)}','${r.model_number||''} / ${r.rarity||''}')">
        <span class="rank-badge">#${r.rank}</span>
        <div class="rank-card-img">${r.image_url ? `<img src="${r.image_url}" loading="lazy" alt="">` : '<span style="font-size:2rem;opacity:0.15">🃏</span>'}</div>
        <div class="rank-card-body">
          <div class="rank-card-name">${r.card_name||''}</div>
          <div class="rank-card-num">${r.model_number||''} ${r.rarity && r.rarity!=='-' ? '/ '+r.rarity : ''}</div>
          <div class="rank-card-price">${fmtPrice(r.buy_price)}</div>
        </div>
      </div>
    `).join('');
  } catch { document.getElementById('rankingScroll').innerHTML = ''; }
}

// ===== PACK LIST =====
function renderPacks(reset) {
  const list = document.getElementById('packList');
  if (reset) { list.innerHTML = ''; packsShown = 0; }
  const slice = allPacks.slice(packsShown, packsShown + PACKS_PER_PAGE);
  if (slice.length === 0 && packsShown === 0) { list.innerHTML = '<div class="loading">パックが見つかりません</div>'; document.getElementById('loadMore').style.display='none'; return; }

  for (const pack of slice) {
    const el = document.createElement('div');
    el.className = 'pack-row';
    el.onclick = () => openPackModal(pack.pack_name, pack.display_name);
    const name = pack.display_name || pack.pack_name;
    const showCode = pack.display_name && pack.display_name !== pack.pack_name;
    el.innerHTML = `
      ${pack.logo_url ? `<img class="pack-row-logo" src="${pack.logo_url}" alt="" loading="lazy" onerror="this.outerHTML='<div class=pack-row-logo-placeholder>&#x1F0CF;</div>'">` : '<div class="pack-row-logo-placeholder">&#x1F0CF;</div>'}
      <div class="pack-row-info">
        <div class="pack-row-name">${name}</div>
        ${showCode ? `<div class="pack-row-code">${pack.pack_name}</div>` : ''}
      </div>
      <div class="pack-row-right">
        ${pack.release_date ? `<span class="pack-row-date">${pack.release_date}</span>` : ''}
        <span class="badge">${pack.card_count}枚</span>
        <span class="pack-row-arrow">&#x203A;</span>
      </div>`;
    list.appendChild(el);
  }
  packsShown += slice.length;
  document.getElementById('loadMore').style.display = packsShown < allPacks.length ? 'flex' : 'none';
}

function showMorePacks() {
  const btn = document.getElementById('loadBtn');
  btn.disabled = true; btn.textContent = '読み込み中...';
  renderPacks(false);
  btn.disabled = false; btn.textContent = 'さらにパックを表示';
}

// ===== MODAL =====
async function openPackModal(packCode, displayName) {
  const packName = packCode;
  const title = displayName || packCode;
  const modal = document.getElementById('cardModal');
  const header = document.getElementById('modalHeader');
  const toolbar = document.getElementById('modalToolbar');
  const body = document.getElementById('modalBody');

  header.innerHTML = `
    <div class="modal-header-info">
      <div class="modal-header-title">${title}</div>
      <div class="modal-header-meta" id="modalMeta">${title !== packCode ? packCode + ' / ' : ''}読み込み中...</div>
    </div>
    <button class="modal-close" onclick="closeModal()">閉じる</button>`;

  toolbar.innerHTML = `
    <span style="font-size:0.65rem;color:var(--muted);letter-spacing:0.08em;text-transform:uppercase">ソート</span>
    <button class="view-btn active" onclick="sortCards('number',this)">番号順</button>
    <button class="view-btn" onclick="sortCards('rarity',this)">レアリティ順</button>
    <button class="view-btn" onclick="sortCards('price',this)">価格順</button>`;

  body.innerHTML = '<div class="modal-loading">カードを読み込み中...</div>';
  modal.classList.add('open');
  document.body.style.overflow = 'hidden';
  currentSort = 'number';

  try {
    const res = await fetch(`/api/card-images?action=cards&game=${currentGame}&pack=${encodeURIComponent(packName)}`);
    const data = await res.json();
    modalCards = data.cards || [];
    document.getElementById('modalMeta').textContent = `${title !== packCode ? packCode + ' / ' : ''}${modalCards.length}枚収録`;
    sortAndRenderCards();
  } catch { body.innerHTML = '<div class="modal-loading">読み込みに失敗しました</div>'; }
}

const RARITY_ORDER = {'SEC':1,'SECRET RARE':1,'SEC/SP':1,'UR':2,'ULTRA RARE':2,'SAR':3,'SPECIAL ART RARE':3,'ART RARE':3,'AR':4,'SR':5,'SUPER RARE':5,'RR':6,'DOUBLE RARE':6,'RR+':6,'R':7,'RARE':7,'UC':8,'U':8,'UNCOMMON':8,'C':9,'COMMON':9,'N':10,'L':0,'LEADER':0,'-':50};

function sortCards(type, btn) {
  currentSort = type;
  document.querySelectorAll('.modal-toolbar .view-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  sortAndRenderCards();
}

function sortAndRenderCards() {
  const cards = [...modalCards];
  if (currentSort === 'number') {
    cards.sort((a,b) => {
      const na = parseInt((a.model_number||'').split('/')[0].replace(/[^0-9]/g,'')) || 9999;
      const nb = parseInt((b.model_number||'').split('/')[0].replace(/[^0-9]/g,'')) || 9999;
      return na - nb;
    });
  } else if (currentSort === 'rarity') {
    cards.sort((a,b) => (RARITY_ORDER[(a.rarity||'-').toUpperCase()]||50) - (RARITY_ORDER[(b.rarity||'-').toUpperCase()]||50));
  } else if (currentSort === 'price') {
    cards.sort((a,b) => {
      const va = parseInt(((a.buy_price||'0')+'').replace(/[^0-9]/g,'')) || 0;
      const vb = parseInt(((b.buy_price||'0')+'').replace(/[^0-9]/g,'')) || 0;
      return vb - va;
    });
  }

  const body = document.getElementById('modalBody');
  if (cards.length === 0) { body.innerHTML = '<div class="modal-loading">このパックにはカードがありません</div>'; return; }

  body.innerHTML = `<div class="card-grid">${cards.map((c,i) => renderCardItem(c,i)).join('')}</div>`;
  modalCards = cards;
}

function renderCardItem(c, idx) {
  const rc = rarityClass(c.rarity);
  return `<div class="card-item" onclick="openLightbox(${idx})">
    <div class="card-img-wrap">
      ${c.image_url ? `<img src="${c.image_url}" alt="${esc(c.card_name)}" loading="lazy">` : '<div class="card-no-img">🃏</div>'}
    </div>
    <div class="card-meta">
      <div class="card-meta-name">${c.card_name||''}</div>
      <div class="card-meta-detail">
        ${c.rarity && c.rarity!=='-' ? `<span class="rarity-badge ${rc}">${c.rarity}</span>` : ''}
        ${c.model_number ? `<span>${c.model_number}</span>` : ''}
      </div>
      ${c.buy_price ? `<div class="card-price">${fmtPrice(c.buy_price)}</div>` : ''}
    </div>
  </div>`;
}

function closeModal() { document.getElementById('cardModal').classList.remove('open'); document.body.style.overflow = ''; modalCards = []; }

// ===== SEARCH =====
function debounceSearch() {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(async () => {
    const q = document.getElementById('searchInput').value.trim();
    if (!q) { init(); return; }
    const content = document.getElementById('mainContent');
    content.innerHTML = '<div class="loading">検索中...</div>';
    try {
      const res = await fetch(`/api/card-images?action=search&game=${currentGame}&search=${encodeURIComponent(q)}`);
      const data = await res.json();
      const cards = data.cards || [];
      modalCards = cards;
      if (cards.length === 0) {
        content.innerHTML = `<div class="loading">「${q}」に一致するカードがありません</div>`;
        return;
      }
      content.innerHTML = `
        <div style="margin-bottom:1rem;font-size:0.78rem;color:var(--muted)">「${q}」の検索結果: ${cards.length}枚</div>
        <div class="card-grid">${cards.map((c,i) => renderCardItem(c,i)).join('')}</div>`;
    } catch { content.innerHTML = '<div class="loading">検索に失敗しました</div>'; }
  }, 400);
}

// ===== GAME SWITCH =====
function setGame(game, btn) {
  currentGame = game;
  document.getElementById('searchInput').value = '';
  document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  init();
}

// ===== LIGHTBOX =====
function openLightbox(idx) {
  const c = modalCards[idx]; if (!c) return;
  const img = c.image_url; if (!img) return;
  document.getElementById('lightboxImg').src = img;
  document.getElementById('lightboxName').textContent = c.card_name || '';
  document.getElementById('lightboxMeta').textContent = fmtPrice(c.buy_price);
  const parts = [c.model_number, c.rarity && c.rarity!=='-' ? c.rarity : '', c.pack_name].filter(Boolean);
  document.getElementById('lightboxDetail').textContent = parts.join(' / ');
  document.getElementById('lightbox').classList.add('open');
}
function openLightboxDirect(img, name, price, detail) {
  if (!img) return;
  document.getElementById('lightboxImg').src = img;
  document.getElementById('lightboxName').textContent = name;
  document.getElementById('lightboxMeta').textContent = price;
  document.getElementById('lightboxDetail').textContent = detail || '';
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox(e) { if (e && e.target !== e.currentTarget && !e.target.classList.contains('lightbox-close')) return; document.getElementById('lightbox').classList.remove('open'); }
function esc(s) { return (s||'').replace(/'/g, "\\'").replace(/"/g, '&quot;'); }

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    if (document.getElementById('lightbox').classList.contains('open')) closeLightbox();
    else if (document.getElementById('cardModal').classList.contains('open')) closeModal();
  }
});

init();
</script>
</body>
</html>
