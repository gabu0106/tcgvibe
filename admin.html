<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TCGVIBE.AI 管理画面</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root { --bg:#fafaf8; --bg2:#f5f3ee; --surface:#fff; --border:rgba(0,0,0,0.08); --text:#1a1814; --muted:#7a7570; --gold:#b8952a; --gold2:#d4af5a; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
  header { background:var(--surface); border-bottom:1px solid var(--border); padding:1.25rem 2rem; display:flex; align-items:center; justify-content:space-between; }
  .logo { font-family:'Cormorant Garamond',serif; font-size:1.4rem; font-weight:600; }
  .logo span { color:var(--gold); }
  .badge { font-size:0.7rem; background:var(--gold); color:#fff; padding:0.2rem 0.6rem; border-radius:2px; letter-spacing:0.1em; }
  main { max-width:800px; margin:3rem auto; padding:0 2rem; }
  h2 { font-family:'Cormorant Garamond',serif; font-size:2rem; font-weight:300; margin-bottom:0.5rem; }
  .desc { color:var(--muted); font-size:0.88rem; margin-bottom:2rem; line-height:1.7; }
  .card { background:var(--surface); border:1px solid var(--border); padding:2rem; margin-bottom:1.5rem; }
  label { display:block; font-size:0.72rem; letter-spacing:0.1em; text-transform:uppercase; color:var(--muted); margin-bottom:0.5rem; }
  select, textarea, input { width:100%; font-family:inherit; font-size:0.88rem; color:var(--text); background:var(--bg); border:1px solid var(--border); padding:0.75rem 1rem; outline:none; transition:border-color 0.2s; margin-bottom:1.25rem; border-radius:2px; }
  select:focus, textarea:focus, input:focus { border-color:var(--gold2); }
  textarea { min-height:200px; resize:vertical; line-height:1.7; }
  .btn { display:inline-flex; align-items:center; gap:0.5rem; padding:0.875rem 2rem; background:var(--text); color:var(--bg); font-family:inherit; font-size:0.8rem; font-weight:500; letter-spacing:0.1em; text-transform:uppercase; border:none; cursor:pointer; border-radius:2px; transition:background 0.2s; }
  .btn:hover { background:var(--gold); }
  .btn:disabled { opacity:0.4; cursor:not-allowed; }
  .result { margin-top:1.5rem; padding:1.5rem; background:var(--bg2); border:1px solid var(--border); border-radius:2px; display:none; }
  .result.show { display:block; }
  .result-title { font-family:'Cormorant Garamond',serif; font-size:1.4rem; font-weight:400; margin-bottom:0.5rem; }
  .result-tag { font-size:0.65rem; letter-spacing:0.15em; text-transform:uppercase; color:var(--gold); margin-bottom:0.75rem; }
  .result-summary { font-size:0.85rem; color:var(--muted); margin-bottom:1rem; line-height:1.7; }
  .result-content { font-size:0.88rem; line-height:1.8; white-space:pre-wrap; }
  .publish-btn { margin-top:1rem; background:var(--gold); }
  .publish-btn:hover { background:#8a6e1a; }
  .status { font-size:0.82rem; color:var(--muted); margin-top:0.75rem; }
  .status.success { color:#2a7a4a; }
  .status.error { color:#8a2a2a; }
  .divider { height:1px; background:var(--border); margin:2rem 0; }
  .tips { background:rgba(184,149,42,0.08); border:1px solid rgba(184,149,42,0.2); padding:1.25rem; border-radius:2px; margin-bottom:2rem; }
  .tips h4 { font-size:0.78rem; font-weight:500; color:var(--gold); letter-spacing:0.05em; margin-bottom:0.5rem; }
  .tips p { font-size:0.82rem; color:var(--muted); line-height:1.7; }
</style>
</head>
<body>
<header>
  <div class="logo">TCGVIBE<span>.AI</span></div>
  <span class="badge">管理画面</span>
</header>
<main>
  <h2>プロ記事を生成する</h2>
  <p class="desc">知り合いのプロプレイヤーからLINEなどで回答をもらい、ここに貼り付けるだけでAIが記事に整形します。</p>
  <div class="tips">
    <h4>💡 使い方</h4>
    <p>① プロに質問をLINEで送る → ② 回答をコピーして下に貼り付ける → ③「記事を生成」を押す → ④ 内容を確認して「公開する」を押す</p>
  </div>
  <div class="card">
    <label>ゲーム</label>
    <select id="game">
      <option value="pokeca">ポケモンカード</option>
      <option value="onepiece">ワンピースカード</option>
      <option value="yugioh">遊戯王</option>
      <option value="mtg">MTG</option>
      <option value="duema">デュエルマスターズ</option>
    </select>
    <label>執筆者名（プロの名前やSNS名）</label>
    <input type="text" id="author" placeholder="例：たろうプロ、@tcg_taro">
    <label>プロからの回答テキスト（LINEの返信をそのままコピペでOK）</label>
    <textarea id="rawText" placeholder="例：今の環境はリザードンexが一番強いと思います。理由は特性れんごくしはいで..."></textarea>
    <button class="btn" id="generateBtn" onclick="generateArticle()">記事を生成する</button>
    <div class="status" id="generateStatus"></div>
  </div>
  <div class="result" id="result">
    <div class="result-tag" id="resultTag"></div>
    <div class="result-title" id="resultTitle"></div>
    <div class="result-summary" id="resultSummary"></div>
    <div class="divider"></div>
    <div class="result-content" id="resultContent"></div>
    <button class="btn publish-btn" id="publishBtn" onclick="publishArticle()">✓ この記事を公開する</button>
    <div class="status" id="publishStatus"></div>
  </div>
</main>
<script>
let generatedArticle = null;

async function generateArticle() {
  const rawText = document.getElementById('rawText').value.trim();
  const game = document.getElementById('game').value;
  const author = document.getElementById('author').value.trim();
  if (!rawText) {
    document.getElementById('generateStatus').textContent = '回答テキストを入力してください';
    document.getElementById('generateStatus').className = 'status error';
    return;
  }
  const btn = document.getElementById('generateBtn');
  btn.disabled = true;
  btn.textContent = '生成中...';
  document.getElementById('generateStatus').textContent = 'AIが記事を生成しています...';
  document.getElementById('generateStatus').className = 'status';
  document.getElementById('result').classList.remove('show');
  try {
    const res = await fetch('/api/admin', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ rawText, game, author }),
    });
    const data = await res.json();
    if (!res.ok || data.error) throw new Error(data.error || 'エラーが発生しました');
    generatedArticle = data.article;
    document.getElementById('resultTag').textContent = `${data.article.emoji} ${data.article.tag}`;
    document.getElementById('resultTitle').textContent = data.article.title;
    document.getElementById('resultSummary').textContent = data.article.summary;
    document.getElementById('resultContent').textContent = data.article.content;
    document.getElementById('result').classList.add('show');
    document.getElementById('generateStatus').textContent = '記事が生成されました！内容を確認して公開してください。';
    document.getElementById('generateStatus').className = 'status success';
  } catch (err) {
    document.getElementById('generateStatus').textContent = 'エラー: ' + err.message;
    document.getElementById('generateStatus').className = 'status error';
  }
  btn.disabled = false;
  btn.textContent = '記事を生成する';
}

async function publishArticle() {
  const btn = document.getElementById('publishBtn');
  btn.disabled = true;
  btn.textContent = '公開中...';
  document.getElementById('publishStatus').textContent = '公開しています...';
  document.getElementById('publishStatus').textContent = '✓ 記事が公開されました！サイトのニュースセクションに表示されます。';
  document.getElementById('publishStatus').className = 'status success';
  btn.textContent = '✓ 公開済み';
}
</script>
</body>
</html>
